
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Serif+Display@400&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  #studio { width:100%; font-family:'DM Sans',sans-serif; background:#1E1E1E; color:#E0DCD6; border-radius:12px; overflow:hidden; display:flex; flex-direction:column; }

  #topbar { display:flex; align-items:center; justify-content:space-between; padding:10px 18px; background:#161616; border-bottom:1px solid rgba(255,255,255,0.07); }
  .tb-eyebrow { font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:rgba(255,255,255,0.25); }
  .tb-title { font-family:'DM Serif Display',serif; font-size:17px; font-weight:400; color:#E0DCD6; }
  .tb-counter { font-size:11px; color:rgba(255,255,255,0.25); }

  #body { display:flex; height:480px; }

  #vp { position:relative; flex:1; background:#2C2C2C; overflow:hidden; }
  #cvs { display:block; width:100%; height:100%; }
  #loading-overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#2C2C2C; z-index:10; }
  .lo-text { font-size:13px; color:rgba(255,255,255,0.4); margin-bottom:14px; letter-spacing:0.06em; }
  .lo-track { width:160px; height:1px; background:rgba(255,255,255,0.1); border-radius:1px; overflow:hidden; }
  .lo-fill { height:100%; width:0%; background:rgba(255,255,255,0.55); transition:width 0.25s; }
  .lo-pct { font-size:11px; color:rgba(255,255,255,0.2); margin-top:9px; }
  .lo-err { font-size:11px; color:rgba(255,140,140,0.8); margin-top:14px; text-align:center; max-width:260px; line-height:1.6; display:none; padding:10px 14px; background:rgba(255,80,80,0.07); border-radius:4px; }
  #vp-hint { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); font-size:10px; color:rgba(255,255,255,0.15); letter-spacing:0.07em; pointer-events:none; white-space:nowrap; }

  #panel { width:280px; flex-shrink:0; background:#161616; border-left:1px solid rgba(255,255,255,0.07); display:flex; flex-direction:column; overflow:hidden; }
  #panel-scroll { flex:1; overflow-y:auto; overflow-x:hidden; }
  #panel-scroll::-webkit-scrollbar { width:2px; }
  #panel-scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); }

  .psec { padding:14px 16px; border-bottom:1px solid rgba(255,255,255,0.06); }
  .psec-label { font-size:9px; text-transform:uppercase; letter-spacing:0.13em; color:rgba(255,255,255,0.22); margin-bottom:7px; }
  #p-number { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.25); margin-bottom:4px; }
  #p-name { font-family:'DM Serif Display',serif; font-size:20px; font-weight:400; color:#E0DCD6; margin-bottom:2px; }

  .sw-row { display:flex; gap:6px; margin-bottom:4px; }
  .sw-item { display:flex; flex-direction:column; align-items:flex-start; gap:4px; }
  .sw-dot { width:32px; height:32px; border-radius:6px; border:1px solid rgba(255,255,255,0.07); }
  .sw-lbl { font-size:9px; color:rgba(255,255,255,0.28); line-height:1.3; }

  .p-box { padding:8px 10px; background:rgba(255,255,255,0.04); border-radius:5px; border-left:2px solid rgba(255,255,255,0.1); font-size:11px; color:rgba(255,255,255,0.48); line-height:1.6; }
  .p-fdm { display:inline-block; padding:3px 8px; background:rgba(255,255,255,0.05); border-radius:4px; font-size:10px; color:rgba(255,255,255,0.38); }
  .p-rational { font-size:11px; color:rgba(255,255,255,0.45); line-height:1.65; }
  .p-quote { margin-top:8px; padding:7px 9px; background:rgba(255,255,255,0.04); border-radius:5px; border-left:2px solid rgba(255,255,255,0.14); font-style:italic; font-size:10px; color:rgba(255,255,255,0.3); }

  #nav { padding:12px 16px; display:flex; align-items:center; gap:8px; border-top:1px solid rgba(255,255,255,0.07); background:#161616; flex-shrink:0; }
  .nav-arrow { width:32px; height:32px; border-radius:50%; border:1px solid rgba(255,255,255,0.12); background:transparent; color:rgba(255,255,255,0.5); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; transition:all 0.18s; }
  .nav-arrow:hover { background:rgba(255,255,255,0.07); border-color:rgba(255,255,255,0.3); color:#fff; }
  #nav-dots { flex:1; display:flex; gap:5px; justify-content:center; flex-wrap:wrap; }
  .ndot { width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,0.15); border:none; cursor:pointer; padding:0; transition:all 0.18s; }
  .ndot.on { background:rgba(255,255,255,0.75); transform:scale(1.3); }
</style>

<div id="studio">
  <div id="topbar">
    <div>
      <div class="tb-eyebrow">CurveBowl · Georgia Link · Interstuhl</div>
      <div class="tb-title">CMF Studio</div>
    </div>
    <span class="tb-counter" id="tb-ctr">1 / 8</span>
  </div>
  <div id="body">
    <div id="vp">
      <canvas id="cvs"></canvas>
      <div id="loading-overlay">
        <div class="lo-text" id="lo-text">Initialisiere…</div>
        <div class="lo-track"><div class="lo-fill" id="lo-fill"></div></div>
        <div class="lo-pct" id="lo-pct"></div>
        <div class="lo-err" id="lo-err"></div>
      </div>
      <div id="vp-hint">Drag · Scroll to zoom · ← → Keys</div>
    </div>
    <div id="panel">
      <div id="panel-scroll">
        <div class="psec">
          <div id="p-number"></div>
          <div id="p-name"></div>
        </div>
        <div class="psec">
          <div class="psec-label">Farbpalette</div>
          <div class="sw-row" id="sw-row"></div>
        </div>
        <div class="psec">
          <div class="psec-label">CMF-Herkunft</div>
          <div class="p-box" id="p-origin"></div>
        </div>
        <div class="psec">
          <div class="psec-label">FDM Material</div>
          <div id="p-fdm-wrap"></div>
        </div>
        <div class="psec">
          <div class="psec-label">Designrational</div>
          <div class="p-rational" id="p-rational"></div>
        </div>
      </div>
      <div id="nav">
        <button class="nav-arrow" id="btn-prev">&#8592;</button>
        <div id="nav-dots"></div>
        <button class="nav-arrow" id="btn-next">&#8594;</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

const MODEL_URL = 'https://raw.githubusercontent.com/julianjansen030104-png/Claude-access/main/bowl.glb';

const VARIANTS = [
  { id:1, name:'Prototype', sub:'Referenz-Druck', bowl:'#A8D1A0', dressing:'#8FC487', lid:'#B8956A', swatches:[{c:'#A8D1A0',l:'Mint\nSchüssel'},{c:'#8FC487',l:'Dunkel Mint\nDressing'},{c:'#B8956A',l:'Holz\nDeckel'}], origin:'Inspir. durch Natur & Handwerk', fdm:'PLA · Neon Green', rational:'Eine frische, organische Interpretation der CurveBowl mit natürlichen Farbtönen.', quote:'Die Schale atmet mit der Natur.' },
  { id:2, name:'Stille Alb', sub:'H16 · Schwäbische Alb', bowl:'#C8D4C0', dressing:'#B0BCA8', lid:'#E8E4DC', swatches:[{c:'#C8D4C0',l:'Salbeigrau\nSchüssel'},{c:'#B0BCA8',l:'Moos\nDressing'},{c:'#E8E4DC',l:'Helles\nDeckel'}], origin:'Landschaft Schwäbische Alb', fdm:'PLA · Sage Green', rational:'Inspiriert von Kalkstein und Heide, zeitlos und elegant.', quote:'Stille Eleganz in Grün und Grau.' },
  { id:3, name:'Noir Sobek', sub:'H16 · Schwarzer Betonkubus', bowl:'#2A2A2A', dressing:'#1A1A1A', lid:'#484848', swatches:[{c:'#2A2A2A',l:'Tiefschwarz\nSchüssel'},{c:'#1A1A1A',l:'Noir\nDressing'},{c:'#484848',l:'Graphit\nDeckel'}], origin:'Architektur H16', fdm:'PLA · Deep Black', rational:'Minimalistisch schwarz – pure Geometrie und Kraft.', quote:'Schwarz ist nicht das Fehlen von Farbe, sondern Substanz.' },
  { id:4, name:'Blanc Architecte', sub:'H16 · Glaskubus Innenraum', bowl:'#F0EEE8', dressing:'#E0DDD4', lid:'#D0CCC4', swatches:[{c:'#F0EEE8',l:'Off-White\nSchüssel'},{c:'#E0DDD4',l:'Warmgrau\nDressing'},{c:'#D0CCC4',l:'Taupe\nDeckel'}], origin:'Glaskubus H16', fdm:'PLA · Ivory', rational:'Helles Minimalismus trifft auf sanfte Wärme.', quote:'Weiß ist das reinste aller Weiß.' },
  { id:5, name:'Terra IST', sub:'Interstuhl Brand · Leder + Rot', bowl:'#C4A882', dressing:'#A88862', lid:'#C8002A', swatches:[{c:'#C4A882',l:'Terra-Beige\nSchüssel'},{c:'#A88862',l:'Rohe Erde\nDressing'},{c:'#C8002A',l:'Interstuhl Rot\nDeckel'}], origin:'Interstuhl Leder & Rot', fdm:'PLA · Terracotta', rational:'Eine Hommage an Interstuhl – Natur trifft auf Markenrot.', quote:'Echte Materialien, echte Farben.' },
  { id:6, name:'Dusk Saison', sub:'Persona · Bewusster Genuss', bowl:'#3D524E', dressing:'#2C3A38', lid:'#D4A96A', swatches:[{c:'#3D524E',l:'Petrol\nSchüssel'},{c:'#2C3A38',l:'Nachtpetrol\nDressing'},{c:'#D4A96A',l:'Goldakzent\nDeckel'}], origin:'Persona Brand Saison', fdm:'PLA · Petrol', rational:'Dunkel und nachdenklich – mit goldenem Glanz.', quote:'Die Dämmerung bringt Ruhe und Reflexion.' },
  { id:7, name:'Mineral Präzision', sub:'Persona · Analytik & Form', bowl:'#C8BFB0', dressing:'#B0A898', lid:'#4A4540', swatches:[{c:'#C8BFB0',l:'Kalkstein\nSchüssel'},{c:'#B0A898',l:'Warmgrau\nDressing'},{c:'#4A4540',l:'Dunkelbraun\nDeckel'}], origin:'Persona Analytik', fdm:'PLA · Stone', rational:'Mineral und Struktur – für den denkenden Nutzer.', quote:'Präzision in Form und Farbe.' },
  { id:8, name:'Nascent', sub:'Prompt · Biobasiert & Ehrlich', bowl:'#C8A882', dressing:'#A88862', lid:'#E8D8C0', swatches:[{c:'#C8A882',l:'Lehm\nSchüssel'},{c:'#A88862',l:'Rohe Erde\nDressing'},{c:'#E8D8C0',l:'Helles Natur\nDeckel'}], origin:'Prompt Bio', fdm:'PLA · Clay', rational:'Nachhaltig, ehrlich, biobasiert – Zurück zu den Wurzeln.', quote:'Authentizität ist das neue Luxus.' }
];

let renderer3, scene, camera, pivot;
let bowlM=[], dressingM=[], lidM=[];
let rotX=0.18, rotY=-0.3, camDist=3.2;
let dragging=false, lastXY={x:0,y:0};
let current=0;

function h2c(h){ return new THREE.Color(parseInt(h.slice(1,3),16)/255,parseInt(h.slice(3,5),16)/255,parseInt(h.slice(5,7),16)/255); }
function setColor(arr,hex){ arr.forEach(m=>{ const ms=Array.isArray(m.material)?m.material:[m.material]; ms.forEach(mt=>mt.color.set(h2c(hex))); }); }
function setStatus(text,pct){ document.getElementById('lo-text').textContent=text; if(pct!==undefined){document.getElementById('lo-fill').style.width=pct+'%'; document.getElementById('lo-pct').textContent=Math.round(pct)+'%';} }
function showError(msg){ const e=document.getElementById('lo-err'); e.style.display='block'; e.innerHTML=msg; document.getElementById('lo-text').style.display='none'; document.getElementById('lo-fill').style.display='none'; document.getElementById('lo-pct').style.display='none'; }

function initRenderer(){
  const canvas=document.getElementById('cvs');
  const vp=document.getElementById('vp');
  renderer3=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
  renderer3.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer3.setClearColor(0x2C2C2C,1);
  renderer3.shadowMap.enabled=true;
  renderer3.shadowMap.type=THREE.PCFSoftShadowMap;

  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(38,1,0.01,100);

  scene.add(new THREE.AmbientLight(0xffffff,0.55));
  const key=new THREE.DirectionalLight(0xfff8f0,1.3); key.position.set(3,5,4); key.castShadow=true; key.shadow.mapSize.set(1024,1024); scene.add(key);
  const fill=new THREE.DirectionalLight(0xf0f4ff,0.45); fill.position.set(-4,1,-1); scene.add(fill);
  const rim=new THREE.DirectionalLight(0xffffff,0.3); rim.position.set(0.5,3,-5); scene.add(rim);

  const gnd=new THREE.Mesh(new THREE.PlaneGeometry(20,20),new THREE.MeshStandardMaterial({color:0x2C2C2C,roughness:1,metalness:0}));
  gnd.rotation.x=-Math.PI/2; gnd.position.y=-0.85; gnd.receiveShadow=true; scene.add(gnd);
  const shd=new THREE.Mesh(new THREE.PlaneGeometry(4,4),new THREE.ShadowMaterial({opacity:0.3}));
  shd.rotation.x=-Math.PI/2; shd.position.y=-0.84; shd.receiveShadow=true; scene.add(shd);

  pivot=new THREE.Group(); scene.add(pivot);

  function doResize(){
    const W=vp.clientWidth, H=vp.clientHeight;
    renderer3.setSize(W,H,false);
    camera.aspect=W/H; camera.updateProjectionMatrix();
  }
  doResize();
  window.addEventListener('resize',doResize);

  canvas.addEventListener('mousedown',e=>{dragging=true;lastXY={x:e.clientX,y:e.clientY};});
  window.addEventListener('mouseup',()=>dragging=false);
  canvas.addEventListener('mousemove',e=>{
    if(!dragging)return;
    rotY+=(e.clientX-lastXY.x)*0.007;
    rotX+=(e.clientY-lastXY.y)*0.006;
    rotX=Math.max(-0.5,Math.min(0.65,rotX));
    lastXY={x:e.clientX,y:e.clientY};
  });
  canvas.addEventListener('wheel',e=>{e.preventDefault();camDist=Math.max(1.5,Math.min(6,camDist+e.deltaY*0.004));},{passive:false});

  (function loop(){
    requestAnimationFrame(loop);
    pivot.rotation.y=rotY; pivot.rotation.x=rotX;
    camera.position.set(0,0.55,camDist); camera.lookAt(0,0,0);
    renderer3.render(scene,camera);
  })();
}

function onModelLoaded(gltf){
  const m=gltf.scene;
  const box=new THREE.Box3().setFromObject(m);
  const size=box.getSize(new THREE.Vector3());
  const center=box.getCenter(new THREE.Vector3());
  const sc=1.7/Math.max(size.x,size.y,size.z);
  m.scale.setScalar(sc);
  m.position.copy(center.multiplyScalar(-sc));
  m.position.y+=0.05;

  const meshes=[];
  m.traverse(child=>{
    if(!child.isMesh)return;
    child.castShadow=true; child.receiveShadow=true;
    child.material=new THREE.MeshStandardMaterial({roughness:0.87,metalness:0.0});
    const b=new THREE.Box3().setFromObject(child);
    const s2=b.getSize(new THREE.Vector3());
    meshes.push({mesh:child, vol:s2.x*s2.y*s2.z, yc:(b.min.y+b.max.y)/2});
    console.log('Mesh found:', child.name, 'vol:', s2.x*s2.y*s2.z, 'yc:', (b.min.y+b.max.y)/2);
  });

  console.log('Total meshes:', meshes.length);
  meshes.sort((a,b)=>b.vol-a.vol);

  if(meshes.length>=3){
    bowlM=[meshes[0].mesh];
    const rest=meshes.slice(1).sort((a,b)=>b.yc-a.yc);
    lidM=[rest[0].mesh];
    dressingM=[rest[1].mesh];
  } else if(meshes.length===2){
    bowlM=[meshes[0].mesh];
    lidM=[meshes[1].mesh];
    dressingM=[];
  } else {
    bowlM=meshes.map(x=>x.mesh);
    dressingM=[]; lidM=[];
  }

  pivot.add(m);
  applyVariant(0);
  document.getElementById('loading-overlay').style.display='none';
}

function startLoading(){
  setStatus('Lade GLTFLoader…', 10);
  const s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
  s.onerror=()=>showError('GLTFLoader konnte nicht geladen werden.');
  s.onload=()=>{
    setStatus('Verbinde mit Server…', 30);
    const loader=new THREE.GLTFLoader();

    loader.load(
      MODEL_URL,
      gltf=>{ onModelLoaded(gltf); },
      xhr=>{
        if(xhr.total){
          const p=Math.round(xhr.loaded/xhr.total*100);
          setStatus('Lade Modell…', 30+Math.round(p*0.7));
        }
      },
      err=>{
        console.error('Load error:', err);
        showError('CORS Fehler oder Datei nicht gefunden.<br><br>Fehlermeldung in der Browser-Konsole prüfen.');
      }
    );
  };
  document.head.appendChild(s);
}

function applyVariant(idx){
  current=idx;
  const v=VARIANTS[idx];
  setColor(bowlM,v.bowl);
  setColor(dressingM,v.dressing||v.bowl);
  setColor(lidM,v.lid);
  document.getElementById('p-number').textContent=`Variante ${String(v.id).padStart(2,'0')} · ${v.sub}`;
  document.getElementById('p-name').textContent=v.name;
  document.getElementById('tb-ctr').textContent=`${v.id} / ${VARIANTS.length}`;
  document.getElementById('sw-row').innerHTML=v.swatches.map(s=>`<div class="sw-item"><div class="sw-dot" style="background:${s.c}"></div><div class="sw-lbl">${s.l.replace('\n','<br>')}</div></div>`).join('');
  document.getElementById('p-origin').textContent=v.origin;
  document.getElementById('p-fdm-wrap').innerHTML=`<span class="p-fdm">${v.fdm}</span>`;
  document.getElementById('p-rational').innerHTML=v.rational+(v.quote?`<div class="p-quote">„${v.quote}"</div>`:'');
  document.querySelectorAll('.ndot').forEach((d,i)=>d.classList.toggle('on',i===idx));
  document.getElementById('panel-scroll').scrollTop=0;
}

function buildNav(){
  const dots=document.getElementById('nav-dots');
  VARIANTS.forEach((_,i)=>{
    const d=document.createElement('button');
    d.className='ndot';
    d.onclick=()=>applyVariant(i);
    dots.appendChild(d);
  });
  document.getElementById('btn-prev').onclick=()=>applyVariant((current-1+VARIANTS.length)%VARIANTS.length);
  document.getElementById('btn-next').onclick=()=>applyVariant((current+1)%VARIANTS.length);
  window.addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft') applyVariant((current-1+VARIANTS.length)%VARIANTS.length);
    if(e.key==='ArrowRight') applyVariant((current+1)%VARIANTS.length);
  });
}

buildNav();
initRenderer();
startLoading();
</script>
